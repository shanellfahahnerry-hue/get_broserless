name: Build ARM64 Mihomo Image Package

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 增加：登录 Docker Hub 以获取更高拉取额度（公共镜像无需私钥）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save Mihomo ARM64 Image
        run: |
          # 核心修复：换用 Docker Hub 官方镜像源，这是最稳的
          # 同时明确指定架构为 arm64
          docker pull --platform linux/arm64 metacubex/mihomo:latest
          
          # 保存为极空间可以识别的 tar 包
          docker save metacubex/mihomo:latest -o mihomo_arm64.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-arm64-image
          path: mihomo_arm64.tar
          retention-days: 1 # 文件只保留1天，下载完即刻失效，保护隐私
