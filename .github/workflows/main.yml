name: Build ARM64 Mihomo Image Package

on: 
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save Mihomo ARM64 Image
        run: |
          # 明确拉取针对 ARM64 架构的镜像
          docker pull --platform linux/arm64 ghcr.io/metacubex/mihomo:latest
          # 将镜像保存为 tar 包
          docker save ghcr.io/metacubex/mihomo:latest -o mihomo_arm64.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-arm64-image
          path: mihomo_arm64.tar
